spring.application.name=aiservice

spring.datasource.username=${dbusername}
spring.datasource.password=${dbpassword}
spring.datasource.url=jdbc:mysql://localhost:3306/fitness_ai_db
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

spring.ai.model.chat=google-genai
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash-lite

spring.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

server.port=8081