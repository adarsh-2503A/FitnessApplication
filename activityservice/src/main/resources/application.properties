spring.application.name=activityservice

spring.datasource.username=${dbusername}
spring.datasource.password=${dbpassword}
spring.datasource.url=jdbc:mysql://localhost:3306/fitness_activity_db
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

server.port=8000

activity.not.found=No activity with the given id is found
user.not.valid=User with the given id does not exist

spring.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest